<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>孵化タイマー - The Ants</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Orbitron:wght@700&family=Rajdhani:wght@600&family=Exo+2:wght@400;700&family=Share+Tech+Mono&family=Audiowide&family=Teko:wght@600&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ===== テーマ ===== */
:root {
  --bg:       #1a1a1a;
  --surface:  #262626;
  --card1:    #2e2e2e;
  --card2:    #272727;
  --border:   #404040;
  --accent:   #f59e0b;
  --countdown:#34d399;
  --text:     #f0f0f0;
  --sub-text: #a0a0a0;
  --dim-text: #686868;
  --font-ui:  'Orbitron', sans-serif;
  --font-body:'Noto Sans JP', sans-serif;
}
[data-theme="light"] {
  --bg:       #f4f4f4;
  --surface:  #ffffff;
  --card1:    #ffffff;
  --card2:    #f8f8f8;
  --border:   #d0d0d0;
  --accent:   #d97706;
  --countdown:#059669;
  --text:     #111111;
  --sub-text: #555555;
  --dim-text: #999999;
}
[data-theme="blue"] {
  --bg:       #0f1923;
  --surface:  #162030;
  --card1:    #1c2a3a;
  --card2:    #182535;
  --border:   #2a3f55;
  --accent:   #38bdf8;
  --countdown:#a78bfa;
  --text:     #e8f4ff;
  --sub-text: #6a90b0;
  --dim-text: #3a5570;
}
[data-theme="green"] {
  --bg:       #0d1a0f;
  --surface:  #132015;
  --card1:    #1a2c1c;
  --card2:    #172718;
  --border:   #2a4030;
  --accent:   #4ade80;
  --countdown:#fbbf24;
  --text:     #e0f4e4;
  --sub-text: #60906a;
  --dim-text: #35573a;
}
[data-theme="purple"] {
  --bg:       #130e1e;
  --surface:  #1c1530;
  --card1:    #251e3c;
  --card2:    #201835;
  --border:   #38285a;
  --accent:   #c084fc;
  --countdown:#fb923c;
  --text:     #ede8ff;
  --sub-text: #7860a8;
  --dim-text: #4a3870;
}
[data-theme="red"] {
  --bg:       #1a0e0e;
  --surface:  #281414;
  --card1:    #341c1c;
  --card2:    #2c1818;
  --border:   #502828;
  --accent:   #f87171;
  --countdown:#60d4b0;
  --text:     #ffe8e8;
  --sub-text: #a06060;
  --dim-text: #704040;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 48px;
  transition: background 0.3s, color 0.3s;
}

.wrapper {
  width: 100%;
  max-width: 480px;
}

/* ===== タイトル ===== */
.title {
  font-family: var(--font-ui);
  font-size: 12px;
  letter-spacing: 0.4em;
  color: var(--accent);
  text-align: center;
  margin-bottom: 16px;
}

/* ===== コントロールパネル ===== */
.controls {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.ctrl-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.ctrl-label {
  font-size: 11px;
  color: var(--sub-text);
  letter-spacing: 0.1em;
  width: 52px;
  flex-shrink: 0;
}

.btn-group {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

/* 共通ボタン */
.ctrl-btn {
  height: 28px;
  padding: 0 10px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--sub-text);
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.ctrl-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}
.ctrl-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

/* テーマ丸ボタン */
.theme-btn {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.theme-btn:hover  { transform: scale(1.15); }
.theme-btn.active { border-color: var(--text); transform: scale(1.1); }
.tb-dark   { background: radial-gradient(circle at 40% 40%, #888, #333); }
.tb-light  { background: radial-gradient(circle at 40% 40%, #fff, #ddd); border: 2px solid #ccc; }
.tb-blue   { background: radial-gradient(circle at 40% 40%, #7dd3fc, #0f1923); }
.tb-green  { background: radial-gradient(circle at 40% 40%, #4ade80, #0d1a0f); }
.tb-purple { background: radial-gradient(circle at 40% 40%, #c084fc, #130e1e); }
.tb-red    { background: radial-gradient(circle at 40% 40%, #f87171, #1a0e0e); }

/* フォントボタンに自身のフォントを適用 */
.fb-orb  { font-family: 'Orbitron', sans-serif; font-size: 9px; }
.fb-raj  { font-family: 'Rajdhani', sans-serif; font-size: 13px; }
.fb-exo  { font-family: 'Exo 2', sans-serif; }
.fb-shr  { font-family: 'Share Tech Mono', monospace; }
.fb-aud  { font-family: 'Audiowide', sans-serif; font-size: 9px; }
.fb-tek  { font-family: 'Teko', sans-serif; font-size: 14px; }

/* ===== 時計バー ===== */
.clock-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.clock-time {
  font-family: var(--font-ui);
  font-size: 20px;
  font-weight: 700;
  color: var(--sub-text);
  letter-spacing: 0.05em;
}
.clock-date {
  font-size: 12px;
  color: var(--dim-text);
  letter-spacing: 0.08em;
}

/* ===== セクションラベル ===== */
.section-label {
  font-size: 11px;
  color: var(--dim-text);
  letter-spacing: 0.2em;
  margin-bottom: 8px;
  padding-left: 2px;
  text-transform: uppercase;
}

/* ===== カード ===== */
#card-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.hatch-card {
  border-radius: 8px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 14px 16px;
  gap: 12px;
  background: var(--card2);
  transition: background 0.3s, border-color 0.3s;
}

.rank-1 {
  background: var(--card1);
  border-color: var(--accent);
  border-width: 2px;
  padding: 16px;
}

/* 左：カウントダウン */
.card-countdown {
  flex: 1;
  min-width: 0;
}
.card-until-label {
  font-size: 10px;
  color: var(--sub-text);
  letter-spacing: 0.15em;
  margin-bottom: 2px;
}
.card-until {
  font-family: var(--font-ui);
  font-weight: 700;
  color: var(--countdown);
  line-height: 1.1;
  white-space: nowrap;
}
.rank-1 .card-until { font-size: clamp(28px, 8vw, 40px); }
.rank-2 .card-until { font-size: clamp(22px, 6vw, 30px); }
.rank-3 .card-until,
.rank-4 .card-until,
.rank-5 .card-until { font-size: clamp(18px, 5vw, 24px); color: var(--sub-text); }

/* 右：曜日・時間帯 */
.card-info {
  text-align: right;
  flex-shrink: 0;
}
.card-day {
  font-size: 11px;
  color: var(--sub-text);
  letter-spacing: 0.1em;
  margin-bottom: 3px;
}
.rank-1 .card-day { color: var(--accent); font-weight: 700; }

.card-slot {
  font-family: var(--font-ui);
  color: var(--text);
}
.rank-1 .card-slot { font-size: clamp(13px, 3.2vw, 16px); font-weight: 700; }
.rank-2 .card-slot { font-size: clamp(12px, 2.8vw, 14px); }
.rank-3 .card-slot,
.rank-4 .card-slot,
.rank-5 .card-slot { font-size: clamp(11px, 2.5vw, 13px); color: var(--sub-text); }

/* NOWバッジ */
.now-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: #000;
  background: var(--accent);
  border-radius: 3px;
  padding: 2px 6px;
  margin-left: 6px;
  vertical-align: middle;
  animation: blink 1.2s ease-in-out infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}
</style>
</head>
<body>
<div class="wrapper">

  <div class="title">🐜 THE ANTS — 孵化タイマー</div>

  <!-- コントロールパネル -->
  <div class="controls">
    <!-- テーマ -->
    <div class="ctrl-row">
      <div class="ctrl-label">テーマ</div>
      <div class="btn-group" id="theme-btns">
        <button class="theme-btn tb-dark   active" data-theme="dark"   title="ダーク"></button>
        <button class="theme-btn tb-light"          data-theme="light"  title="ライト"></button>
        <button class="theme-btn tb-blue"           data-theme="blue"   title="ブルー"></button>
        <button class="theme-btn tb-green"          data-theme="green"  title="グリーン"></button>
        <button class="theme-btn tb-purple"         data-theme="purple" title="パープル"></button>
        <button class="theme-btn tb-red"            data-theme="red"    title="レッド"></button>
      </div>
    </div>
    <!-- フォント -->
    <div class="ctrl-row">
      <div class="ctrl-label">フォント</div>
      <div class="btn-group" id="font-btns">
        <button class="ctrl-btn fb-orb active" data-font="'Orbitron', sans-serif">ORB</button>
        <button class="ctrl-btn fb-raj"        data-font="'Rajdhani', sans-serif">RAJ</button>
        <button class="ctrl-btn fb-exo"        data-font="'Exo 2', sans-serif">EXO</button>
        <button class="ctrl-btn fb-shr"        data-font="'Share Tech Mono', monospace">SHR</button>
        <button class="ctrl-btn fb-aud"        data-font="'Audiowide', sans-serif">AUD</button>
        <button class="ctrl-btn fb-tek"        data-font="'Teko', sans-serif">TEK</button>
      </div>
    </div>
    <!-- 表示数 -->
    <div class="ctrl-row">
      <div class="ctrl-label">表示数</div>
      <div class="btn-group" id="count-btns">
        <button class="ctrl-btn" data-n="1">1</button>
        <button class="ctrl-btn" data-n="2">2</button>
        <button class="ctrl-btn active" data-n="3">3</button>
        <button class="ctrl-btn" data-n="4">4</button>
        <button class="ctrl-btn" data-n="5">5</button>
      </div>
    </div>
  </div>

  <!-- 時計バー -->
  <div class="clock-bar">
    <div class="clock-time" id="clock">--:--:--</div>
    <div class="clock-date" id="date">----年--月--日（-）</div>
  </div>

  <div class="section-label">次の孵化ポイント時間帯</div>
  <div id="card-list"></div>

</div>

<script>
const SLOTS = [
  { day:1, h:15, label:'月曜日', disp:'15:05-16:00' },
  { day:1, h:16, label:'月曜日', disp:'16:05-17:00' },
  { day:1, h:23, label:'月曜日', disp:'23:05-24:00' },
  { day:2, h: 0, label:'火曜日', disp:' 0:05- 1:00' },
  { day:2, h: 7, label:'火曜日', disp:' 7:05- 8:00' },
  { day:2, h: 8, label:'火曜日', disp:' 8:05- 9:00' },
  { day:2, h:12, label:'火曜日', disp:'12:05-13:00' },
  { day:2, h:15, label:'火曜日', disp:'15:05-16:00' },
  { day:2, h:20, label:'火曜日', disp:'20:05-21:00' },
  { day:2, h:23, label:'火曜日', disp:'23:05-24:00' },
  { day:3, h: 4, label:'水曜日', disp:' 4:05- 5:00' },
  { day:3, h: 7, label:'水曜日', disp:' 7:05- 8:00' },
  { day:3, h:13, label:'水曜日', disp:'13:05-14:00' },
  { day:3, h:21, label:'水曜日', disp:'21:05-22:00' },
  { day:4, h: 5, label:'木曜日', disp:' 5:05- 6:00' },
  { day:5, h:14, label:'金曜日', disp:'14:05-15:00' },
  { day:5, h:15, label:'金曜日', disp:'15:05-16:00' },
  { day:5, h:22, label:'金曜日', disp:'22:05-23:00' },
  { day:5, h:23, label:'金曜日', disp:'23:05-24:00' },
  { day:6, h: 6, label:'土曜日', disp:' 6:05- 7:00' },
  { day:6, h: 7, label:'土曜日', disp:' 7:05- 8:00' },
  { day:6, h:15, label:'土曜日', disp:'15:05-16:00' },
  { day:6, h:16, label:'土曜日', disp:'16:05-17:00' },
  { day:6, h:23, label:'土曜日', disp:'23:05-24:00' },
  { day:0, h: 0, label:'日曜日', disp:' 0:05- 1:00' },
  { day:0, h: 7, label:'日曜日', disp:' 7:05- 8:00' },
  { day:0, h: 8, label:'日曜日', disp:' 8:05- 9:00' },
];

const DAYS_JP = ['日','月','火','水','木','金','土'];
let displayCount = 3;

function secondsUntil(now, slot) {
  const nowMs = now.getTime();
  const midnight = new Date(now); midnight.setHours(0,0,0,0);
  const mondayMs = midnight.getTime() - ((now.getDay()+6)%7)*86400000;
  const offset = (slot.day+6)%7;
  let startMs = mondayMs + offset*86400000 + slot.h*3600000 + 5*60000;
  const endMs = startMs + 55*60000;
  if (nowMs >= startMs && nowMs < endMs) return 0;
  if (startMs <= nowMs) startMs += 7*86400000;
  return Math.floor((startMs - nowMs)/1000);
}

function formatCountdown(secs) {
  if (secs === 0) return 'NOW';
  const d = Math.floor(secs/86400);
  const h = Math.floor((secs%86400)/3600);
  const m = Math.floor((secs%3600)/60);
  let s = '';
  if (d > 0) s += d + '日 ';
  s += String(h).padStart(2,'0') + '時間 ';
  s += String(m).padStart(2,'0') + '分';
  return s;
}

function buildCards() {
  const list = document.getElementById('card-list');
  list.innerHTML = '';
  for (let i = 0; i < displayCount; i++) {
    const rank = i + 1;
    const card = document.createElement('div');
    card.className = `hatch-card rank-${rank}`;
    card.id = `card-${rank}`;
    card.innerHTML = `
      <div class="card-countdown">
        <div class="card-until-label" id="c-label-${rank}"></div>
        <div class="card-until" id="c-until-${rank}"></div>
      </div>
      <div class="card-info">
        <div class="card-day" id="c-day-${rank}"></div>
        <div class="card-slot" id="c-slot-${rank}"></div>
      </div>`;
    list.appendChild(card);
  }
}

function updateCards(sorted) {
  for (let i = 0; i < displayCount; i++) {
    const item = sorted[i];
    const rank = i + 1;
    const active = item.secs === 0;
    const dayEl   = document.getElementById(`c-day-${rank}`);
    const slotEl  = document.getElementById(`c-slot-${rank}`);
    const labelEl = document.getElementById(`c-label-${rank}`);
    const untilEl = document.getElementById(`c-until-${rank}`);
    if (!dayEl) continue;
    dayEl.innerHTML = item.label + (active ? ' <span class="now-badge">NOW</span>' : '');
    slotEl.textContent  = item.disp;
    labelEl.textContent = active ? '' : 'あと';
    untilEl.textContent = formatCountdown(item.secs);
  }
}

function tick() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
  document.getElementById('date').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${DAYS_JP[now.getDay()]}）`;
  const sorted = SLOTS.map(s => ({...s, secs: secondsUntil(now, s)}))
                       .sort((a,b) => a.secs - b.secs);
  updateCards(sorted);
}

// 表示数
document.getElementById('count-btns').addEventListener('click', e => {
  const btn = e.target.closest('[data-n]');
  if (!btn) return;
  displayCount = parseInt(btn.dataset.n);
  document.querySelectorAll('#count-btns .ctrl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildCards(); tick();
});

// テーマ
document.getElementById('theme-btns').addEventListener('click', e => {
  const btn = e.target.closest('.theme-btn');
  if (!btn) return;
  const t = btn.dataset.theme;
  document.body.dataset.theme = (t === 'dark') ? '' : t;
  if (t === 'dark') delete document.body.dataset.theme;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
});

// フォント
document.getElementById('font-btns').addEventListener('click', e => {
  const btn = e.target.closest('[data-font]');
  if (!btn) return;
  document.documentElement.style.setProperty('--font-ui', btn.dataset.font);
  document.querySelectorAll('#font-btns .ctrl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
});

buildCards();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
